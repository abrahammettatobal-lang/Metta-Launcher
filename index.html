<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metta Launcher</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #080807;
        color: #f4eadc;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #boot-fallback {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        min-height: 100%;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        text-align: center;
        padding: 24px;
        background: #080807;
      }
      #boot-fallback .dot {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        border: 1px solid rgba(201, 162, 39, 0.35);
        background: rgba(201, 162, 39, 0.12);
        animation: pulse 1.2s ease-in-out infinite;
      }
      #boot-error {
        display: none;
        max-width: 520px;
        color: #fca5a5;
        font-size: 13px;
        line-height: 1.5;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="dark min-h-full antialiased">
    <div id="root"></div>
    <div id="boot-fallback">
      <div class="dot" aria-hidden="true"></div>
      <div>Cargando Metta Launcher…</div>
      <div id="boot-error"></div>
    </div>
    <script>
      window.addEventListener("error", function (e) {
        var el = document.getElementById("boot-error");
        if (!el) return;
        el.style.display = "block";
        el.textContent =
          "Error al iniciar la interfaz: " + (e.message || "desconocido");
      });
      window.addEventListener("unhandledrejection", function (e) {
        var el = document.getElementById("boot-error");
        if (!el) return;
        el.style.display = "block";
        el.textContent = "Error al iniciar la interfaz: " + String(e.reason || e);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
